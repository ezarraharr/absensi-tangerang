<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1e40af">
  <title>Absensi Tangerang</title>
 
  <link rel="manifest" href="manifest.json">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6; }
    .card { background: white; border-radius: 20px; box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .clock { font-size: 3.2rem; font-weight: 700; }
  </style>
</head>
<body class="min-h-screen pb-8">
  <div class="max-w-lg mx-auto px-4 py-6">

    <div class="card p-6 text-center mb-6">
      <h1 class="text-3xl font-bold text-blue-700">📋 Absensi Karyawan</h1>
      <p class="text-gray-600 mt-1">Kantor Tangerang</p>
    </div>

    <div class="card p-6 text-center mb-6">
      <p class="text-gray-600">Waktu Sekarang</p>
      <div id="clock" class="clock text-blue-600"></div>
      <div id="date" class="text-lg text-gray-700 mt-2"></div>
    </div>

    <!-- Pilih Nama -->
    <div class="card p-6 mb-6">
      <h2 class="text-xl font-semibold text-center mb-4">Pilih Nama Karyawan</h2>
      <div class="grid grid-cols-2 gap-4" id="employee-list"></div>
    </div>

    <!-- Absen -->
    <div class="card p-6 mb-6">
      <h2 class="text-xl font-semibold text-center mb-4">Absen Masuk</h2>
      <div class="text-center mb-6">
        <p class="text-lg">Nama Terpilih: <span id="selected-name" class="font-bold text-blue-600 text-xl">—</span></p>
      </div>
      <button onclick="absenMasuk()" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-7 rounded-3xl shadow-lg">
        📍 ABSEN MASUK SEKARANG
      </button>
      <div id="result" class="mt-5 text-center hidden"></div>
    </div>

    <!-- Riwayat -->
    <div class="card p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">📋 Riwayat Absensi</h2>
        <button onclick="clearHistory()" class="text-red-600 text-sm font-medium">Hapus Semua</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="py-3 px-4 text-left">Tanggal</th>
              <th class="py-3 px-4 text-left">Waktu</th>
              <th class="py-3 px-4 text-left">Nama</th>
              <th class="py-3 px-4 text-left">Status</th>
            </tr>
          </thead>
          <tbody id="history" class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const karyawan = ["Farhan", "Adit"];
    let selectedNama = "";
    let absensiData = [];

    const kantorLat = -6.2088;
    const kantorLon = 106.6160;
    const radiusMeter = 10;
    const adminPassword = "Artomoro123";

    function renderEmployeeList() {
      const container = document.getElementById('employee-list');
      container.innerHTML = ''; // bersihkan dulu
      karyawan.forEach(nama => {
        const btn = document.createElement('button');
        btn.className = "px-6 py-5 bg-gray-100 hover:bg-blue-100 rounded-3xl text-lg font-medium border-2 border-gray-200 active:bg-blue-200";
        btn.textContent = nama;
        btn.onclick = () => pilihNama(nama);
        container.appendChild(btn);
      });
    }

    function pilihNama(nama) {
      selectedNama = nama;
      document.getElementById('selected-name').textContent = nama;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID', { hour12: false });
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date').textContent = now.toLocaleDateString('id-ID', options) + " - Tangerang";
    }

    function hitungJarak(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    async function absenMasuk() {
      if (selectedNama) {
        // Karyawan Biasa
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(pos => {
            const jarak = hitungJarak(kantorLat, kantorLon, pos.coords.latitude, pos.coords.longitude);
            if (jarak > radiusMeter) {
              alert(`❌ Anda berada di luar kantor!\nJarak: ${Math.round(jarak)} meter (Maksimal 10 meter)`);
              return;
            }
            prosesAbsen();
          }, () => alert("❌ Gagal mendapatkan lokasi.\nPastikan GPS aktif."));
        }
        return;
      }

      // Admin Bypass
      const pass = prompt("Masukkan Password Admin:");
      if (pass === adminPassword) {
        const nama = prompt("Masukkan nama yang akan diabsenkan:").trim();
        if (nama) {
          selectedNama = nama;
          prosesAbsen(` (Admin Bypass)`);
        }
      } else {
        alert("Password salah.");
      }
    }

    function prosesAbsen(bypass = "") {
      const now = new Date();
      const waktu = now.toLocaleTimeString('id-ID', { hour12: false });
      const status = (now.getHours() < 8 || (now.getHours() === 8 && now.getMinutes() <= 0)) ? "✅ Tidak Terlambat" : "⚠️ Terlambat";

      absensiData.unshift({
        tanggal: now.toLocaleDateString('id-ID'),
        waktu,
        nama: selectedNama,
        status: status + bypass
      });

      document.getElementById('result').innerHTML = `
        <div class="p-5 rounded-3xl bg-green-50 border border-green-200">
          <p class="text-2xl font-bold text-green-600">${status}</p>
          <p class="mt-2">${selectedNama} berhasil absen pukul <strong>${waktu}</strong>${bypass}</p>
        </div>`;
      document.getElementById('result').classList.remove('hidden');
      loadHistory();
    }

    function loadHistory() {
      const tbody = document.getElementById('history');
      tbody.innerHTML = absensiData.length === 0 
        ? `<tr><td colspan="4" class="text-center py-8 text-gray-500">Belum ada riwayat</td></tr>`
        : absensiData.map(r => `
          <tr class="hover:bg-gray-50">
            <td class="py-3 px-4">${r.tanggal}</td>
            <td class="py-3 px-4">${r.waktu}</td>
            <td class="py-3 px-4 font-medium">${r.nama}</td>
            <td class="py-3 px-4">${r.status}</td>
          </tr>`).join('');
    }

    function clearHistory() {
      if (confirm("Hapus semua riwayat?")) {
        absensiData = [];
        loadHistory();
      }
    }

    // Jalankan saat halaman selesai dimuat
    window.onload = function() {
      renderEmployeeList();
      updateClock();
      setInterval(updateClock, 1000);
      loadHistory();
    };
  </script>
</body>
</html>
