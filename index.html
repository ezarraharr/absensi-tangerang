<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e40af">
  <title>Absensi Tangerang</title>
 
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/837/837560.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .clock { font-size: 3.6rem; font-weight: 700; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-lg mx-auto p-4">
    <div class="bg-white rounded-3xl shadow-xl p-6 text-center mb-6">
      <h1 class="text-3xl font-bold text-blue-700">📋 Absensi Karyawan</h1>
      <p class="text-gray-600">Kantor Tangerang</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 text-center mb-6">
      <p class="text-gray-600">Waktu Sekarang</p>
      <div id="clock" class="clock text-blue-600"></div>
      <div id="date" class="text-lg text-gray-700 mt-2"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
      <h2 class="text-xl font-semibold text-center mb-4">Pilih Nama Karyawan</h2>
      <div class="grid grid-cols-2 gap-4" id="employee-list"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
      <h2 class="text-xl font-semibold text-center mb-4">Absen Masuk</h2>
      <div class="text-center mb-6">
        <p class="text-lg">Nama Terpilih: <span id="selected-name" class="font-bold text-blue-600 text-xl">—</span></p>
      </div>
      <button onclick="absenMasuk()"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-6 rounded-3xl shadow-lg">
        📍 ABSEN MASUK SEKARANG
      </button>
      <div id="result" class="mt-5 text-center hidden"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">📋 Riwayat Absensi</h2>
        <button onclick="clearHistory()" class="px-3 py-1 bg-red-100 text-red-600 rounded-xl text-sm font-medium hover:bg-red-200">Hapus Semua Riwayat</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="py-3 px-4 text-left">Tanggal</th>
              <th class="py-3 px-4 text-left">Waktu</th>
              <th class="py-3 px-4 text-left">Nama</th>
              <th class="py-3 px-4 text-left">Status</th>
            </tr>
          </thead>
          <tbody id="history" class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const karyawan = ["Farhan", "Adit"];
    let selectedNama = "";
    let absensiData = [];

    const kantorLat = -6.2088;
    const kantorLon = 106.6160;
    const radiusMeter = 10;           // Radius
