<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e40af">
  <title>Absensi Tangerang</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/837/837560.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .clock { font-size: 3.6rem; font-weight: 700; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-lg mx-auto p-4">
    <div class="bg-white rounded-3xl shadow-xl p-6 text-center mb-6">
      <h1 class="text-3xl font-bold text-blue-700">📋 Absensi Karyawan</h1>
      <p class="text-gray-600">Kantor Tangerang</p>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 text-center mb-6">
      <p class="text-gray-600">Waktu Sekarang</p>
      <div id="clock" class="clock text-blue-600"></div>
      <div id="date" class="text-lg text-gray-700 mt-2"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
      <h2 class="text-xl font-semibold text-center mb-4">Pilih Nama Karyawan</h2>
      <div class="grid grid-cols-2 gap-4" id="employee-list"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6 mb-6">
      <h2 class="text-xl font-semibold text-center mb-4">Absen Masuk</h2>
      <div class="text-center mb-6">
        <p class="text-lg">Nama Terpilih: <span id="selected-name" class="font-bold text-blue-600 text-xl">—</span></p>
      </div>
      <button onclick="absenMasuk()" 
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-lg py-6 rounded-3xl shadow-lg">
        📍 ABSEN MASUK SEKARANG
      </button>
      <div id="result" class="mt-5 text-center hidden"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-xl p-6">
      <h2 class="text-xl font-semibold mb-4">📋 Riwayat Absensi</h2>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="py-3 px-4 text-left">Tanggal</th>
              <th class="py-3 px-4 text-left">Waktu</th>
              <th class="py-3 px-4 text-left">Nama</th>
              <th class="py-3 px-4 text-left">Status</th>
            </tr>
          </thead>
          <tbody id="history" class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const karyawan = ["Farhan", "Adit"];
    let selectedNama = "";

    // === SETTING LOKASI KANTOR ===
    const kantorLat = -6.2088;   
    const kantorLon = 106.6160;
    const radiusMeter = 100;     

    // Password Admin (Hanya HP kamu yang tahu)
    const adminPassword = "Artomoro123";

    function renderEmployeeList() {
      document.getElementById('employee-list').innerHTML = karyawan.map(nama => `
        <button onclick="pilihNama('${nama}')" class="px-6 py-5 bg-gray-100 hover:bg-blue-100 rounded-3xl text-lg font-medium border-2">
          ${nama}
        </button>
      `).join('');
    }

    function pilihNama(nama) {
      selectedNama = nama;
      document.getElementById('selected-name').textContent = nama;
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID', { hour12: false });
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date').textContent = now.toLocaleDateString('id-ID', options) + " - Tangerang";
    }
    setInterval(updateClock, 1000);
    updateClock();

    function hitungJarak(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function absenMasuk() {
      if (!selectedNama) return alert("❌ Pilih nama dulu!");

      const inputPass = prompt("Masukkan Password Admin (kosongkan jika karyawan biasa):");
      
      if (inputPass === adminPassword) {
        prosesAbsen(" (Admin Bypass)");
        return;
      }

      // Cek Lokasi untuk karyawan biasa
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
          const jarak = hitungJarak(kantorLat, kantorLon, pos.coords.latitude, pos.coords.longitude);
          
          if (jarak > radiusMeter) {
            alert(`❌ Anda berada di luar kantor!\nJarak saat ini: ${Math.round(jarak)} meter`);
            return;
          }
          prosesAbsen();
        }, () => alert("❌ Gagal mendapatkan lokasi.\nPastikan GPS aktif dan izinkan akses lokasi."));
      } else {
        alert("Browser tidak mendukung lokasi.");
      }
    }

    function prosesAbsen(bypass = "") {
      const now = new Date();
      const waktu = now.toLocaleTimeString('id-ID', { hour12: false });
      const status = (now.getHours() < 8 || (now.getHours() === 8 && now.getMinutes() <= 0)) 
        ? "✅ Tidak Terlambat" : "⚠️ Terlambat";

      let absensi = JSON.parse(localStorage.getItem('absensi')) || [];
      absensi.unshift({ 
        tanggal: now.toLocaleDateString('id-ID'), 
        waktu, 
        nama: selectedNama, 
        status: status + bypass 
      });
      
      localStorage.setItem('absensi', JSON.stringify(absensi));

      document.getElementById('result').innerHTML = `
        <div class="p-5 rounded-3xl bg-green-50 border border-green-200">
          <p class="text-2xl font-bold text-green-600">${status}</p>
          <p class="mt-2">${selectedNama} berhasil absen pukul <strong>${waktu}</strong></p>
        </div>`;
      document.getElementById('result').classList.remove('hidden');

      loadHistory();
    }

    function loadHistory() {
      const tbody = document.getElementById('history');
      const data = JSON.parse(localStorage.getItem('absensi')) || [];
      tbody.innerHTML = data.length === 0 
        ? `<tr><td colspan="4" class="text-center py-8 text-gray-500">Belum ada riwayat</td></tr>`
        : data.map(r => `
          <tr class="hover:bg-gray-50">
            <td class="py-3 px-4">${r.tanggal}</td>
            <td class="py-3 px-4">${r.waktu}</td>
            <td class="py-3 px-4">${r.nama}</td>
            <td class="py-3 px-4">${r.status}</td>
          </tr>`).join('');
    }

    window.onload = () => { renderEmployeeList(); loadHistory(); };
  </script>
</body>
</html>
