<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1e40af">
  <title>Absensi Tangerang</title>
  
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/837/837560.png">

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
    .clock { font-size: 3.8rem; font-weight: bold; letter-spacing: -2px; }
    .name-btn { transition: all 0.3s; }
    .name-btn.active { background-color: #1e40af; color: white; border-color: #1e40af; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="max-w-5xl mx-auto py-8 px-4">
    <div class="bg-white rounded-3xl shadow-2xl p-6 mb-6 text-center">
      <h1 class="text-3xl font-bold text-blue-700">📋 Absensi Karyawan</h1>
      <p class="text-gray-600 mt-1">Kantor Tangerang</p>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-6 mb-8 text-center">
      <p class="text-lg text-gray-600">Waktu Sekarang</p>
      <div id="clock" class="clock text-blue-600"></div>
      <div id="date" class="text-xl text-gray-700 mt-3"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8">
      <h2 class="text-2xl font-semibold mb-6 text-center">Pilih Nama Karyawan</h2>
      <div class="grid grid-cols-2 gap-4" id="employee-list"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-8 mb-8">
      <h2 class="text-2xl font-semibold mb-6 text-center">Absen Masuk</h2>
      <div class="text-center mb-6">
        <p class="text-lg">Nama Terpilih: <span id="selected-name" class="font-bold text-blue-600 text-2xl">—</span></p>
      </div>
      <button onclick="absenMasuk()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold text-xl py-7 rounded-3xl shadow-lg">
        📍 ABSEN MASUK SEKARANG
      </button>
      <div id="result" class="mt-6 text-center hidden"></div>
    </div>

    <div class="bg-white rounded-3xl shadow-2xl p-6">
      <h2 class="text-2xl font-semibold mb-4">📋 Riwayat Absensi</h2>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50">
            <tr>
              <th class="py-4 px-6 text-left">Tanggal</th>
              <th class="py-4 px-6 text-left">Waktu</th>
              <th class="py-4 px-6 text-left">Nama</th>
              <th class="py-4 px-6 text-left">Status</th>
            </tr>
          </thead>
          <tbody id="history" class="divide-y"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const karyawan = ["Farhan", "Adit"];
    let selectedNama = "";

    function renderEmployeeList() {
      const container = document.getElementById('employee-list');
      container.innerHTML = karyawan.map(nama => `
        <button onclick="pilihNama('${nama}')" class="name-btn px-8 py-6 bg-gray-100 hover:bg-blue-100 rounded-3xl text-lg font-medium text-center border-2">
          ${nama}
        </button>
      `).join('');
    }

    function pilihNama(nama) {
      selectedNama = nama;
      document.getElementById('selected-name').textContent = nama;
      document.querySelectorAll('.name-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim() === nama);
      });
    }

    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent = now.toLocaleTimeString('id-ID', { hour12: false });
      const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
      document.getElementById('date').textContent = now.toLocaleDateString('id-ID', options) + " - Tangerang";
    }
    setInterval(updateClock, 1000);
    updateClock();

    function absenMasuk() {
      if (!selectedNama) return alert("❌ Pilih nama dulu!");

      const now = new Date();
      const waktu = now.toLocaleTimeString('id-ID', { hour12: false });
      const status = (now.getHours() < 8 || (now.getHours() === 8 && now.getMinutes() <= 0)) 
        ? "✅ Tidak Terlambat" : "⚠️ Terlambat";

      let absensi = JSON.parse(localStorage.getItem('absensi')) || [];
      absensi.unshift({ tanggal: now.toLocaleDateString('id-ID'), waktu, nama: selectedNama, status });
      localStorage.setItem('absensi', JSON.stringify(absensi));

      const result = document.getElementById('result');
      result.innerHTML = `
        <div class="p-6 rounded-3xl ${status.includes('Tidak') ? 'bg-green-50' : 'bg-red-50'}">
          <p class="text-3xl font-bold ${status.includes('Tidak') ? 'text-green-600' : 'text-red-600'}">${status}</p>
          <p class="mt-3">${selectedNama} absen pukul <strong>${waktu}</strong></p>
        </div>`;
      result.classList.remove('hidden');
      loadHistory();
    }

    function loadHistory() {
      const tbody = document.getElementById('history');
      const data = JSON.parse(localStorage.getItem('absensi')) || [];
      tbody.innerHTML = data.length === 0 ? 
        `<tr><td colspan="4" class="py-12 text-center text-gray-500">Belum ada riwayat</td></tr>` :
        data.map(r => `
          <tr class="hover:bg-gray-50">
            <td class="py-4 px-6">${r.tanggal}</td>
            <td class="py-4 px-6">${r.waktu}</td>
            <td class="py-4 px-6">${r.nama}</td>
            <td class="py-4 px-6">${r.status}</td>
          </tr>`).join('');
    }

    window.onload = () => { renderEmployeeList(); loadHistory(); };
  </script>
</body>
</html>
